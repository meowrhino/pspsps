# pspsps — un único Worker sirve el front estático (public/) y el WebSocket (/ws).
# Patrón heredado de rumrum: assets + Durable Object por sala en el mismo deploy.

name = "pspsps"
main = "worker/src/index.js"
compatibility_date = "2025-04-01"

# Mantener también la URL *.workers.dev como respaldo estable.
workers_dev = true

# Dominio bonito. meowrhino.studio ya es una zona de esta cuenta de Cloudflare
# (rumrum.meowrhino.studio ya vive ahí); Wrangler crea el registro DNS + el
# certificado automáticamente al desplegar.
routes = [
  { pattern = "pspsps.meowrhino.studio", custom_domain = true },
]

# Front estático: el Worker corre primero (para interceptar /ws y /vapid-public)
# y delega en los assets para todo lo demás.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Un Durable Object por sala/conversación (motor de realtime + SQLite cifrado).
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Web Push: la clave pública VAPID y el subject son públicos (van aquí). La
# privada va como secret: `node tools/make-vapid.mjs` y luego
# `cat /tmp/pspsps-vapid.json | jq -r .private | wrangler secret put VAPID_PRIVATE`.
[vars]
VAPID_PUBLIC = "BMr_wzw-Q9BZqXpKkinp6cQeFenpko2EB2seVQRVmzN-nJxDzImhuTk0-4M_IMkhkoZLEtIBvFz-Xcf2OkGJVUE"
VAPID_SUBJECT = "mailto:hola@meowrhino.studio"
